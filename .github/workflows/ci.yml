name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install SDL2 dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev pkg-config
      - name: Check
        run: cargo check
      - name: Doctor
        run: cargo run -- --doctor
        continue-on-error: true

  windows-package:
    name: Windows package
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 runtime/link dependencies
        shell: pwsh
        run: |
          vcpkg install sdl2:x64-windows sdl2-ttf:x64-windows
          $prefix = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIB=$prefix\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INCLUDE=$prefix\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$prefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build
        shell: pwsh
        run: cargo build --release

      - name: Build FBNeo libretro core
        shell: pwsh
        run: .\tools\build-fbneo-windows.ps1

      - name: Stage SDL DLLs
        shell: pwsh
        # See release.yml — vcpkg's SDL2_ttf pulls freetype + zlib + others.
        # Copy every vcpkg DLL so a clean Windows runtime has no "DLL not
        # found" surprises.
        run: |
          $bin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Copy-Item "$bin\*.dll" "target\release\" -Force

      - name: Package
        shell: pwsh
        run: .\package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: freeplay-gametalk-windows-${{ github.sha }}
          path: dist/freeplay-gametalk-v*.zip
          if-no-files-found: error
