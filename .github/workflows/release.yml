name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.4.3"
        required: true
        default: "v0.4.3"
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# Pin upstream FBNeo across Linux/macOS jobs so a release ships a known core,
# rather than whatever upstream master happened to be the day CI ran. Bump
# this when you've validated a newer FBNeo locally.
env:
  FBNEO_REF: master

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag matches Cargo.toml
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${REF_NAME}"
          if [ "$EVENT_NAME" != "push" ]; then tag="${INPUT_TAG}"; fi
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "Release tag ${tag} does not match Cargo.toml version ${version}; expected ${expected}." >&2
            exit 1
          fi

  windows:
    name: Windows release package
    needs: validate-version
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 runtime/link dependencies
        shell: pwsh
        run: |
          vcpkg install sdl2:x64-windows sdl2-ttf:x64-windows
          $prefix = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIB=$prefix\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INCLUDE=$prefix\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$prefix\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build
        shell: pwsh
        run: cargo build --release

      - name: Cache FBNeo libretro core
        id: fbneo-cache
        uses: actions/cache@v4
        with:
          path: |
            cores/fbneo_libretro.dll
            vendor/FBNeo
          key: fbneo-windows-${{ env.FBNEO_REF }}

      - name: Build FBNeo libretro core
        if: steps.fbneo-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\tools\build-fbneo-windows.ps1

      - name: Stage SDL DLLs
        shell: pwsh
        # vcpkg's SDL2_ttf depends on freetype.dll, which in turn pulls in
        # zlib1.dll, bz2.dll, libpng16.dll, brotlicommon.dll, brotlidec.dll.
        # Older builds got away with just SDL2.dll/SDL2_ttf.dll because dev
        # machines had freetype on PATH from elsewhere; a clean Windows
        # install bombs with "freetype.dll was not found". Copy every DLL
        # vcpkg installed — bundle size is fine, correctness is the win.
        run: |
          $bin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Copy-Item "$bin\*.dll" "target\release\" -Force
          Get-ChildItem "target\release\*.dll" | Select-Object Name | Format-Table

      - name: Package
        shell: pwsh
        run: .\package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeplay-gametalk-windows
          path: dist/freeplay-gametalk-v*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $tag = if ($env:EVENT_NAME -eq "push") { $env:REF_NAME } else { $env:INPUT_TAG }
          $asset = Get-ChildItem "dist/freeplay-gametalk-v*.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Release zip not found"
          }
          $version = $tag.TrimStart("v")
          $notesLines = New-Object System.Collections.Generic.List[string]
          $inSection = $false
          foreach ($line in Get-Content CHANGELOG.md) {
            if ($line -match "^##\s+$([regex]::Escape($version))(\s|-|$)") {
              $inSection = $true
              continue
            }
            if ($inSection -and $line -match "^##\s+") {
              break
            }
            if ($inSection) {
              $notesLines.Add($line)
            }
          }
          $notes = ($notesLines -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Automated freeplay-gametalk client release. ROM files are not included."
          } else {
            $notes = "$notes`n`nROM files are not included."
          }
          gh release view $tag --repo $env:GH_REPO *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $env:GH_REPO --notes $notes
            gh release upload $tag $asset.FullName --repo $env:GH_REPO --clobber
          } else {
            $args = @(
              "release", "create", $tag,
              $asset.FullName,
              "--repo", $env:GH_REPO,
              "--title", $tag,
              "--notes", $notes
            )
            if ($env:INPUT_PRERELEASE -eq "true") {
              $args += "--prerelease"
            }
            gh @args
          }

  linux:
    name: Linux release package
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build + SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libsdl2-dev libsdl2-ttf-dev

      - name: Cache FBNeo libretro core
        id: fbneo-cache
        uses: actions/cache@v4
        with:
          path: |
            cores/fbneo_libretro.so
            vendor/FBNeo
          key: fbneo-linux-${{ env.FBNEO_REF }}

      - name: Build FBNeo libretro core
        if: steps.fbneo-cache.outputs.cache-hit != 'true'
        run: ./tools/build-fbneo-linux.sh

      - name: Build freeplay
        run: cargo build --release

      - name: Package
        run: ./package-linux.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeplay-gametalk-linux
          path: dist/freeplay-gametalk-v*-linux.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          tag="${REF_NAME}"
          if [ "$EVENT_NAME" != "push" ]; then tag="${INPUT_TAG}"; fi
          asset="$(ls dist/freeplay-gametalk-v*-linux.tar.gz | head -n1)"
          if [ -z "$asset" ]; then echo "release tarball not found" >&2; exit 1; fi
          version="${tag#v}"
          notes="$(awk -v version="$version" '
            $0 ~ "^##[[:space:]]+" version "([[:space:]]|-|$)" { in_section=1; next }
            in_section && $0 ~ "^##[[:space:]]+" { exit }
            in_section {
              if (!seen && $0 == "") next
              seen=1
              lines[++n]=$0
            }
            END {
              while (n > 0 && lines[n] == "") n--
              for (i=1; i<=n; i++) print lines[i]
            }
          ' CHANGELOG.md)"
          if [ -z "${notes//[[:space:]]/}" ]; then
            notes="Automated freeplay-gametalk client release. ROM files are not included."
          else
            notes="$(printf "%s\n\nROM files are not included." "$notes")"
          fi
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GH_REPO" --notes "$notes"
            gh release upload "$tag" "$asset" --repo "$GH_REPO" --clobber
          else
            args=(release create "$tag" "$asset" --repo "$GH_REPO" --title "$tag" --notes "$notes")
            if [ "$INPUT_PRERELEASE" = "true" ]; then args+=(--prerelease); fi
            gh "${args[@]}"
          fi

  macos:
    name: macOS release package (${{ matrix.arch }})
    needs: validate-version
    strategy:
      # Build both Mac architectures natively, one per runner: macos-14 is
      # Apple Silicon (arm64), macos-13 is the last Intel (x86_64) runner.
      # fail-fast off so a flaky Intel runner doesn't kill the arm64 release.
      # NOTE: GitHub is sunsetting Intel runners; if macos-13 is retired the
      # x86_64 entry must move to cross-compilation (harder for the FBNeo C core).
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 dependencies
        run: brew install sdl2 sdl2_ttf

      - name: Expose Homebrew lib/include to linker
        # On Apple Silicon runners brew installs to /opt/homebrew, which is
        # NOT in the default search path for `cc`/`ld`. Without this the
        # final link of the freeplay binary fails with "library 'SDL2' not
        # found" even though `brew install sdl2` succeeded.
        run: |
          BREW_PREFIX="$(brew --prefix)"
          {
            echo "LIBRARY_PATH=$BREW_PREFIX/lib"
            echo "CPATH=$BREW_PREFIX/include"
            echo "PKG_CONFIG_PATH=$BREW_PREFIX/lib/pkgconfig"
          } >> "$GITHUB_ENV"

      - name: Cache FBNeo libretro core
        id: fbneo-cache
        uses: actions/cache@v4
        with:
          path: |
            cores/fbneo_libretro.dylib
            vendor/FBNeo
          # Per-arch key: an arm64 .dylib must never be restored on the Intel
          # job (or vice versa) — that would ship a core for the wrong CPU.
          key: fbneo-macos-${{ matrix.arch }}-${{ env.FBNEO_REF }}

      - name: Build FBNeo libretro core
        if: steps.fbneo-cache.outputs.cache-hit != 'true'
        run: ./tools/build-fbneo-macos.sh

      - name: Build freeplay
        run: cargo build --release

      - name: Package
        run: ./package-macos.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeplay-gametalk-macos-${{ matrix.arch }}
          path: dist/freeplay-gametalk-v*-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          tag="${REF_NAME}"
          if [ "$EVENT_NAME" != "push" ]; then tag="${INPUT_TAG}"; fi
          asset="$(ls dist/freeplay-gametalk-v*-macos-*.tar.gz | head -n1)"
          if [ -z "$asset" ]; then echo "release tarball not found" >&2; exit 1; fi
          version="${tag#v}"
          notes="$(awk -v version="$version" '
            $0 ~ "^##[[:space:]]+" version "([[:space:]]|-|$)" { in_section=1; next }
            in_section && $0 ~ "^##[[:space:]]+" { exit }
            in_section {
              if (!seen && $0 == "") next
              seen=1
              lines[++n]=$0
            }
            END {
              while (n > 0 && lines[n] == "") n--
              for (i=1; i<=n; i++) print lines[i]
            }
          ' CHANGELOG.md)"
          if [ -z "${notes//[[:space:]]/}" ]; then
            notes="Automated freeplay-gametalk client release. ROM files are not included."
          else
            notes="$(printf "%s\n\nROM files are not included." "$notes")"
          fi
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GH_REPO" --notes "$notes"
            gh release upload "$tag" "$asset" --repo "$GH_REPO" --clobber
          else
            args=(release create "$tag" "$asset" --repo "$GH_REPO" --title "$tag" --notes "$notes")
            if [ "$INPUT_PRERELEASE" = "true" ]; then args+=(--prerelease); fi
            gh "${args[@]}"
          fi
